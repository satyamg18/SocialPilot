name: Auto-Publishing Cron

on:
  schedule:
    # Runs every 15 minutes to bypass Vercel's daily limit on the free Hobby tier
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SocialAgent Auto-Publish
        run: |
          curl -X GET "https://socialagent18.vercel.app/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
